appId: app.capgo.ffmpeg
name: Convert image from picker
---
- stopApp
- launchApp
- runFlow: subflows/dismiss-launcher-anr.yaml
- scrollUntilVisible:
    element:
      text: "Load demo image"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 50
    centerElement: true
- runFlow: subflows/dismiss-launcher-anr.yaml
- tapOn: "Load demo image"
- extendedWaitUntil:
    visible:
      text: "sample-image.png staged in the app cache."
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Convert image"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 50
    centerElement: true
- runFlow: subflows/dismiss-launcher-anr.yaml
- tapOn:
    text: "Convert image"
- extendedWaitUntil:
    visible:
      text: "Converted .* to (jpeg|webp).*"
    timeout: 30000
- assertVisible:
    text: "Converted .* to (jpeg|webp).*"
- takeScreenshot: "image-conversion-complete"
