appId: app.capgo.ffmpeg
name: Run runtime checks
---
- stopApp
- launchApp
- runFlow: subflows/dismiss-launcher-anr.yaml
- scrollUntilVisible:
    element:
      text: "Run runtime checks"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 50
    centerElement: true
- runFlow: subflows/dismiss-launcher-anr.yaml
- tapOn: "Run runtime checks"
- extendedWaitUntil:
    visible: "Plugin version endpoint"
    timeout: 30000
- assertVisible: "Capability matrix endpoint"
- assertVisible: "Progress listener registration"
- assertVisible: "Unsupported re-encode contract"
- assertVisible: "Unsupported image conversion contract"
- takeScreenshot: "runtime-checks-complete"
