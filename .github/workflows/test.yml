name: Build source code and test it

on:
  push:
    branches:
      - renovate/**
  pull_request:
    branches: [main]
  workflow_call: # Allow this workflow to be called by other workflows

jobs:
  changes:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      maestro_android: ${{ steps.filter.outputs.maestro_android }}
      maestro_ios: ${{ steps.filter.outputs.maestro_ios }}
      web: ${{ steps.filter.outputs.web }}
      guard_swiftpm: ${{ steps.filter.outputs.guard_swiftpm }}
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - 'android/**'
              - 'src/**'
              - 'scripts/**'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/test.yml'
              - 'example-app/android/**'
              - 'example-app/src/**'
              - 'example-app/package.json'
              - 'example-app/scripts/run-maestro-android*.sh'
              - 'example-app/.maestro/**'
            ios:
              - 'ios/**'
              - 'Package.swift'
              - 'CapgoCapacitorFfmpeg.podspec'
              - 'src/**'
              - 'scripts/**'
              - 'package.json'
              - 'bun.lock'
              - 'example-app/ios/**'
              - 'example-app/src/**'
              - 'example-app/scripts/run-maestro-ios.sh'
              - 'example-app/.maestro/**'
            maestro_android:
              - 'android/**'
              - 'src/**'
              - 'scripts/**'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/test.yml'
              - 'example-app/android/**'
              - 'example-app/src/**'
              - 'example-app/package.json'
              - 'example-app/scripts/run-maestro-android*.sh'
              - 'example-app/.maestro/**'
            maestro_ios:
              - 'ios/**'
              - 'Package.swift'
              - 'CapgoCapacitorFfmpeg.podspec'
              - 'src/**'
              - 'scripts/**'
              - 'package.json'
              - 'bun.lock'
              - 'example-app/ios/**'
              - 'example-app/src/**'
              - 'example-app/scripts/run-maestro-ios.sh'
              - 'example-app/.maestro/**'
            web:
              - 'src/**'
              - 'scripts/**'
              - 'package.json'
              - 'bun.lock'
              - 'README.md'
              - 'rollup.config.mjs'
              - 'tsconfig.json'
              - '.github/workflows/test.yml'
            guard_swiftpm:
              - 'Package.swift'
  guard_swiftpm_version:
    needs: changes
    if: needs.changes.outputs.guard_swiftpm == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Enforce capacitor-swift-pm version
        run: |
          set -euo pipefail
          if ! grep -Eq 'https://github.com/ionic-team/capacitor-swift-pm\.git"[[:space:]]*,[[:space:]]*from:[[:space:]]*"8\.0\.0"' Package.swift; then
            echo "Expected capacitor-swift-pm to be pinned to 8.0.0 in Package.swift"
            exit 1
          fi
  build_android:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Check plugin wiring
        run: bun run check:wiring
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Build
        id: build_code
        run: bun run verify:android
  build_ios:
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    timeout-minutes: 30
    runs-on: macOS-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Check plugin wiring
        run: bun run check:wiring
      - name: Build
        id: build_code
        run: bun run verify:ios && bun run test:macos
  maestro_android:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: [changes, build_android]
    if: needs.changes.outputs.maestro_android == 'true'
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install root dependencies
        run: bun i
      - name: Build plugin package
        run: bun run build
      - name: Install example app dependencies
        run: cd example-app && bun install --force
      - name: Build and sync example app
        run: cd example-app && bun run build && bun run sync:android
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Setup Android SDK tools
        uses: android-actions/setup-android@v3
      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=2.4.0
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Run Android Maestro flows
        run: cd example-app && ./scripts/run-maestro-android-ci.sh
      - name: Upload Android Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-artifacts
          path: example-app/build/maestro
      - name: Publish Android Maestro JUnit report
        if: always() && hashFiles('example-app/build/maestro/android-report.xml') != ''
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: example-app/build/maestro/android-report.xml
          require_tests: true
  maestro_ios:
    timeout-minutes: 60
    runs-on: macOS-latest
    needs: [changes, build_ios, guard_swiftpm_version]
    if: needs.changes.outputs.maestro_ios == 'true'
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install root dependencies
        run: bun i
      - name: Build plugin package
        run: bun run build
      - name: Install example app dependencies
        run: cd example-app && bun install --force
      - name: Build and sync example app
        run: cd example-app && bun run build && bun run sync:ios
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=2.4.0
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Start iOS simulator
        run: |
          maestro start-device --platform ios --os-version 18
          BOOTED_SIMULATOR_ID=$(xcrun simctl list devices booted | awk -F '[()]' '/Booted/ { print $2; exit }')
          if [[ -z "$BOOTED_SIMULATOR_ID" ]]; then
            echo "No booted simulator found after maestro start-device." >&2
            exit 1
          fi
          echo "BOOTED_SIMULATOR_ID=$BOOTED_SIMULATOR_ID" >> "$GITHUB_ENV"
      - name: Build and install iOS example app
        run: |
          cd example-app
          xcodebuild -project ios/App/App.xcodeproj -scheme App -destination "platform=iOS Simulator,id=$BOOTED_SIMULATOR_ID" -derivedDataPath build/ios-sim build
          xcrun simctl install "$BOOTED_SIMULATOR_ID" build/ios-sim/Build/Products/Debug-iphonesimulator/App.app
      - name: Run iOS Maestro flows
        run: |
          cd example-app
          BOOTED_SIMULATOR_ID="$BOOTED_SIMULATOR_ID" bun run maestro:ios
      - name: Upload iOS Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-artifacts
          path: example-app/build/maestro
      - name: Publish iOS Maestro JUnit report
        if: always() && hashFiles('example-app/build/maestro/ios-report.xml') != ''
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: example-app/build/maestro/ios-report.xml
          require_tests: true
  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    name: 'Build code and test'
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Check plugin wiring
        run: bun run check:wiring
      - name: Lint
        id: lint_code
        run: bun run lint
      - name: Build
        id: build_code
        run: bun run build
      - name: Verify
        id: verify_code
        run: bun run verify:web
